# Remap prefix to Ctrl+a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Mouse support
set -g mouse on

# OSC 52 clipboard (works over SSH)
set -g set-clipboard on
set -g allow-passthrough on
# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Don't rename windows automatically
set -g allow-rename off

# Increase history
set -g history-limit 50000

# True color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Reduce escape time (important for vim/neovim)
set -sg escape-time 0

# Focus events (needed for vim autoread)
set -g focus-events on

# Use zsh
set -g default-shell /home/linuxbrew/.linuxbrew/bin/zsh

# ---- Keybindings ----

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize with uppercase
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window keeps current path
bind c new-window -c "#{pane_current_path}"

# Easy reload
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Sesh session picker (Ctrl+a T)
bind-key "T" display-popup -h 90% -w 50% -E "sesh picker -i"

# Toggle mouse (Ctrl+a m) — disable when OpenCode fights over mouse events
bind m set -g mouse \; display "Mouse #{?mouse,ON,OFF}"

# Vi mode for copy
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
#bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel
#bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "printf '\033]52;c;%s\a' \$(base64) > /dev/tty"
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "~/osc52copy.sh"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "~/osc52copy.sh"
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "~/osc52copy.sh"

# ---- Status bar ----
set -g status-position bottom
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 60
set -g status-left '#[fg=#1e1e2e,bg=#89b4fa,bold] #S #[fg=#89b4fa,bg=#1e1e2e] '
set -g status-right '#[fg=#6c7086]#{?client_prefix,#[fg=#f38ba8] PREFIX ,}#[fg=#a6adc8]#H #[fg=#6c7086]| #[fg=#a6adc8]%b %d %H:%M '
setw -g window-status-current-format '#[fg=#1e1e2e,bg=#89b4fa,bold] #I:#W#{?window_zoomed_flag, Z,} #[fg=#89b4fa,bg=#1e1e2e]'
setw -g window-status-format '#[fg=#6c7086] #I:#W '
setw -g window-status-separator ''

# Pane borders
set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#89b4fa'

# ---- Plugins ----
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'Ataraxy-Labs/opensessions'
set -g @opensessions-width "30"
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect - save/restore sessions (prefix + Ctrl-s to save, prefix + Ctrl-r to restore)
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes 'nvim vim lazygit btop'

# Continuum - auto-save every 15 min, auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize tpm (must be last line)
run '~/.tmux/plugins/tpm/tpm'
